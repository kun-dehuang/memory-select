[phases.setup]
nixPkgs = ["python311"]

[phases.build]
cmds = [
  "pip install --upgrade pip setuptools wheel",
  "pip install google-api-core>=2.11.0 google-generativeai>=0.8.0,<1.0.0",
  "pip install -r requirements.txt"
]

[start]
cmd = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"

[healthcheck]
path = "/health"
timeout = 300
